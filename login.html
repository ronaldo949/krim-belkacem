<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <!-- Meta -->
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>
        تسجيل الدخول | ثانوية كريم بلقاسم
    </title>

    <!-- CSS -->
    <link rel="stylesheet"
        href="css/style.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Extra Style -->

    <style>

        body {

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            background:
                linear-gradient(
                    rgba(15,23,42,0.75),
                    rgba(15,23,42,0.75)
                ),
                url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1600&auto=format&fit=crop");

            background-size: cover;

            background-position: center;

            padding: 20px;
        }

        .login-container {

            width: 100%;

            max-width: 460px;
        }

        .login-card {

            background: rgba(255,255,255,0.96);

            backdrop-filter: blur(12px);

            border-radius: 32px;

            padding: 45px 35px;

            box-shadow: 0 20px 50px rgba(0,0,0,0.2);

            text-align: center;

            animation: fadeUp 0.7s ease;
        }

        @keyframes fadeUp {

            from {

                opacity: 0;

                transform: translateY(30px);
            }

            to {

                opacity: 1;

                transform: translateY(0);
            }
        }

        .login-logo {

            width: 95px;

            height: 95px;

            border-radius: 24px;

            margin: auto auto 25px;

            background: linear-gradient(
                135deg,
                var(--primary),
                var(--primary-dark)
            );

            display: flex;

            align-items: center;

            justify-content: center;

            color: white;

            font-size: 2.5rem;

            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .login-card h1 {

            color: var(--primary);

            margin-bottom: 12px;

            font-size: 2rem;
        }

        .login-card p {

            color: #64748b;

            line-height: 1.8;

            margin-bottom: 30px;
        }

        .input-group {

            text-align: right;

            margin-bottom: 22px;
        }

        .input-group label {

            display: block;

            margin-bottom: 10px;

            color: #1e293b;

            font-weight: 700;
        }

        .input-box {

            position: relative;
        }

        .input-box i {

            position: absolute;

            top: 50%;

            right: 18px;

            transform: translateY(-50%);

            color: var(--secondary);
        }

        .input-box input {

            width: 100%;

            padding: 16px 50px 16px 16px;

            border-radius: 16px;

            border: 1px solid #dbe2ea;

            font-family: "Cairo", sans-serif;

            font-size: 1rem;

            transition: 0.3s;

            background: #f8fafc;
        }

        .input-box input:focus {

            outline: none;

            border-color: var(--secondary);

            box-shadow: 0 0 0 4px rgba(230,126,34,0.1);

            background: white;
        }

        .login-btn {

            width: 100%;

            border: none;

            background: linear-gradient(
                135deg,
                var(--primary),
                var(--primary-dark)
            );

            color: white;

            padding: 16px;

            border-radius: 16px;

            font-family: "Cairo", sans-serif;

            font-size: 1rem;

            font-weight: 700;

            cursor: pointer;

            transition: 0.3s;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 12px;
        }

        .login-btn:hover {

            transform: translateY(-4px);
        }

        .login-note {

            margin-top: 25px;

            padding: 18px;

            border-radius: 18px;

            background: #f8fafc;

            color: #475569;

            line-height: 1.9;

            font-size: 0.95rem;
        }

        .login-note i {

            color: var(--secondary);
        }

        .back-home {

            display: inline-flex;

            align-items: center;

            gap: 8px;

            margin-top: 25px;

            text-decoration: none;

            color: white;

            background: rgba(255,255,255,0.12);

            padding: 12px 18px;

            border-radius: 14px;

            transition: 0.3s;
        }

        .back-home:hover {

            background: rgba(255,255,255,0.2);
        }

        @media (max-width:768px) {

            .login-card {

                padding: 35px 25px;
            }

            .login-card h1 {

                font-size: 1.7rem;
            }
        }

    </style>

</head>

<body>

    <div class="login-container">

        <!-- Card -->

        <div class="login-card">

            <!-- Logo -->

            <div class="login-logo">

                <i class="fas fa-user-graduate"></i>

            </div>

            <!-- Title -->

            <h1>
                تسجيل الدخول
            </h1>

            <p>
                قم بتسجيل الدخول باستخدام حساب Google
                ورمز التلميذ الخاص بك للوصول إلى فضاء التلميذ.
            </p>

            <!-- Form -->

            <form id="loginForm">

                <div class="input-group">

                    <label>
                        رمز التلميذ
                    </label>

                    <div class="input-box">

                        <i class="fas fa-id-card"></i>

                        <input
                            type="text"
                            id="studentCode"
                            placeholder="مثال : KB2024001"
                            required>

                    </div>

                </div>

                <button
                    type="submit"
                    class="login-btn"
                    id="loginBtn">

                    <i class="fab fa-google"></i>

                    تسجيل الدخول عبر Google

                </button>

            </form>

            <!-- Note -->

            <div class="login-note">

                <i class="fas fa-shield-halved"></i>

                يتم تأمين الحساب عبر Google
                وربط البريد الإلكتروني برمز التلميذ
                لحماية الحسابات من الانتحال.

            </div>

        </div>

        <!-- Back -->

        <div style="text-align:center;">

            <a href="index.html"
                class="back-home">

                <i class="fas fa-arrow-right"></i>

                العودة للرئيسية

            </a>

        </div>

    </div>

    <!-- Login JS -->

    <script type="module"
        src="js/login.js"></script>

</body>

</html>
