<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        تسجيل الدخول | ثانوية كريم بلقاسم
    </title>

    <!-- CSS -->
    <link rel="stylesheet"
        href="css/style.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Extra Style -->

    <style>

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:

            linear-gradient(

                rgba(15,23,42,0.75),

                rgba(15,23,42,0.75)

            ),

            url("images/hero-bg.jpg")

            center/cover no-repeat;

            padding:20px;

        }

        .login-container{

            width:100%;

            max-width:460px;

        }

        .login-card{

            background:rgba(255,255,255,0.96);

            backdrop-filter:blur(12px);

            border-radius:28px;

            padding:45px 35px;

            box-shadow:

            0 15px 40px rgba(0,0,0,0.18);

            animation:fadeUp 0.8s ease;

        }

        .login-logo{

            text-align:center;

            margin-bottom:30px;

        }

        .login-logo .icon{

            width:85px;

            height:85px;

            margin:auto;

            border-radius:24px;

            background:

            linear-gradient(

                135deg,

                var(--primary),

                var(--accent)

            );

            display:flex;

            justify-content:center;

            align-items:center;

            color:white;

            font-size:2rem;

            box-shadow:var(--shadow-lg);

            margin-bottom:18px;

        }

        .login-logo h1{

            font-size:1.8rem;

            color:var(--secondary);

            margin-bottom:8px;

        }

        .login-logo p{

            color:var(--gray);

            font-size:0.95rem;

        }

        .login-form{

            margin-top:25px;

        }

        .input-group{

            margin-bottom:22px;

        }

        .input-group label{

            display:block;

            margin-bottom:10px;

            font-weight:700;

            color:var(--secondary);

        }

        .input-box{

            position:relative;

        }

        .input-box i{

            position:absolute;

            top:50%;

            right:18px;

            transform:translateY(-50%);

            color:var(--primary);

            font-size:1rem;

        }

        .input-box input{

            width:100%;

            height:58px;

            border-radius:18px;

            border:2px solid var(--border);

            padding:0 55px 0 18px;

            font-family:'Cairo',sans-serif;

            font-size:1rem;

            outline:none;

            transition:0.3s ease;

            background:white;

        }

        .input-box input:focus{

            border-color:var(--primary);

            box-shadow:

            0 0 0 4px rgba(37,99,235,0.12);

        }

        .google-btn{

            width:100%;

            height:58px;

            border:none;

            border-radius:18px;

            background:

            linear-gradient(

                135deg,

                var(--primary),

                var(--accent)

            );

            color:white;

            font-size:1rem;

            font-weight:700;

            cursor:pointer;

            transition:0.3s ease;

            display:flex;

            justify-content:center;

            align-items:center;

            gap:12px;

            box-shadow:var(--shadow);

        }

        .google-btn:hover{

            transform:translateY(-4px);

            box-shadow:

            0 12px 25px rgba(37,99,235,0.28);

        }

        .login-status{

            margin-top:20px;

            text-align:center;

            font-weight:700;

            color:var(--primary);

        }

        .login-note{

            margin-top:28px;

            text-align:center;

            color:var(--gray);

            font-size:0.92rem;

            line-height:1.8;

        }

        .back-home{

            margin-top:28px;

            text-align:center;

        }

        .back-home a{

            text-decoration:none;

            color:var(--primary);

            font-weight:700;

            transition:0.3s ease;

        }

        .back-home a:hover{

            color:var(--primary-dark);

        }

        @media(max-width:480px){

            .login-card{

                padding:35px 24px;

                border-radius:24px;

            }

            .login-logo h1{

                font-size:1.5rem;

            }

        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <!-- Logo -->

            <div class="login-logo">

                <div class="icon">
                    <i class="fas fa-school"></i>
                </div>

                <h1>
                    تسجيل الدخول
                </h1>

                <p>
                    ثانوية كريم بلقاسم - تيزي وزو
                </p>

            </div>

            <!-- Login Form -->

            <div class="login-form">

                <!-- Student Code -->

                <div class="input-group">

                    <label>
                        رمز التلميذ
                    </label>

                    <div class="input-box">

                        <i class="fas fa-id-card"></i>

                        <input
                            type="text"
                            id="studentCode"
                            placeholder="أدخل رمز التلميذ">

                    </div>

                </div>

                <!-- Google Button -->

                <button
                    class="google-btn"
                    id="googleLoginBtn">

                    <i class="fab fa-google"></i>

                    تسجيل الدخول عبر Google

                </button>

                <!-- Status -->

                <div
                    class="login-status"
                    id="loginStatus">

                </div>

                <!-- Note -->

                <div class="login-note">

                    يتم تسجيل الدخول باستخدام
                    حساب Google الحقيقي لضمان
                    حماية وأمان حسابات التلاميذ.

                </div>

                <!-- Back Home -->

                <div class="back-home">

                    <a href="index.html">

                        <i class="fas fa-arrow-right"></i>

                        العودة للرئيسية

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Login JS -->

    <script
        type="module"
        src="js/login.js">

    </script>

</body>

</html>
